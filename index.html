    function showWarnings(warnings, stats) {
      const messages = [...(warnings || [])];
      if (stats && stats.truncated) {
        messages.push("表示上限によって一部ノードは画面に返していません。大きなログでは上限を上げる前にブラウザのメモリに注意してください。");
      }
      els.warnings.innerHTML = messages.map((message) => `<div class="notice">${escapeHtml(message)}</div>`).join("");
    }

    function createWorker() {
      const source = document.getElementById("worker-source").textContent;
      const blob = new Blob([source], { type: "text/javascript" });
      const url = URL.createObjectURL(blob);
      const worker = new Worker(url);
      let revoked = false;
      const revoke = () => {
        if (!revoked) {
          URL.revokeObjectURL(url);
          revoked = true;
        }
      };
      worker.addEventListener("error", revoke, { once: true });
      worker.addEventListener("message", (event) => {
        if (["result", "error", "rowResult", "rowError"].includes(event.data.type)) revoke();
      });
      worker.revokeObjectUrl = revoke;
      return worker;
    }

    function currentConfig() {
      const mapping = {};
      for (const field of FIELD_DEFS) mapping[field.key] = Number(state.mapping[field.key] ?? -1);
      return {
        delimiter: state.delimiter,
        encoding: state.encoding,
        mapping,
        options: {
          renderLimit: Number(els.renderLimit.value),
          includeUnknownRoot: els.includeUnknownRoot.checked,
          preferTimeInference: els.preferTimeInference.checked
        }
      };
    }

    function startAnalysis() {
      if (!state.file || state.worker) return;
      clearResult();
      setProgress(0, "解析を開始しました");
      els.analyzeButton.disabled = true;
      els.cancelButton.disabled = false;

      const worker = createWorker();
      state.worker = worker;

      worker.onmessage = (event) => {
        const message = event.data;
        if (message.type === "progress") {
          const percent = message.totalBytes ? (message.bytesRead / message.totalBytes) * 100 : 0;
          setProgress(percent, `${formatBytes(message.bytesRead)} / ${formatBytes(message.totalBytes)}、${formatNumber(message.rows)} 行、${formatNumber(message.nodes)} ノード`);
        } else if (message.type === "result") {
          finishAnalysis(message);
        } else if (message.type === "error") {
          failAnalysis(message.message);
        }
      };

      worker.onerror = (error) => {
        failAnalysis(error.message || "Worker error");
      };

      worker.postMessage({
        type: "analyze",
        file: state.file,
        config: currentConfig()
      });
    }

    function stopAnalysis() {
      if (!state.worker) return;
      state.worker.terminate();
      state.worker = null;
      els.cancelButton.disabled = true;
      updateAnalyzeAvailability();
      setProgress(0, "停止しました");
    }

    function failAnalysis(message) {
      if (state.worker) {
        state.worker.terminate();
        state.worker = null;
      }
      els.cancelButton.disabled = true;
      updateAnalyzeAvailability();
      setProgress(0, "解析に失敗しました");
      els.warnings.innerHTML = `<div class="notice danger">${escapeHtml(message)}</div>`;
    }

    function finishAnalysis(result) {
      if (state.worker) {
        state.worker.terminate();
        state.worker = null;
      }
      els.cancelButton.disabled = true;
      updateAnalyzeAvailability();
      state.graph = result;
      state.nodeById = new Map(result.nodes.map((node) => [node.id, node]));
      state.expanded = new Set(result.roots);
      state.selectedId = null;
      state.childReveal.clear();
      updateStats(result.stats);
      showWarnings(result.warnings, result.stats);
      setProgress(100, `${formatNumber(result.stats.rows)} 行を解析しました`);
      setGraphControls(true);
      renderTree();
    }

    function compareNodes(a, b, mode) {
      if (mode === "events") {
        if (a.eventCount !== b.eventCount) return b.eventCount - a.eventCount;
      } else if (mode === "children") {
        if (a.descendantCount !== b.descendantCount) return b.descendantCount - a.descendantCount;
      } else if (mode === "name") {
        return a.name.localeCompare(b.name);
      } else {
        const at = Date.parse(a.firstSeen);
        const bt = Date.parse(b.firstSeen);
        if (Number.isFinite(at) && Number.isFinite(bt) && at !== bt) return at - bt;
      }
      return a.id - b.id;
    }

    function nodeSearchText(node) {
      return [
        node.name,
        node.pid,
        node.uniqueId,
        node.creationTime,
        node.firstSeen,
        node.path,
        node.commandLine,
        node.account,
        node.deviceLabel,
        node.deviceId,
        node.parentReason,
        Object.keys(node.actionTypes || {}).join(" ")
      ].join(" ").toLowerCase();
    }

    function actionEntries(node) {
      return Object.entries(node.actionTypes || {})
        .filter(([, count]) => Number(count) > 0)
        .sort((a, b) => {
          if (b[1] !== a[1]) return b[1] - a[1];
          return a[0].localeCompare(b[0]);
        });
    }

    function renderActionBadges(node, limit) {
      const entries = actionEntries(node);
      if (!entries.length) return "";
      const shown = entries.slice(0, limit).map(([name, count]) => {
        const suffix = count > 1 ? ` ${formatNumber(count)}` : "";
        return `<span class="badge action" title="ActionType: ${escapeHtml(name)}">${escapeHtml(name)}${suffix}</span>`;
      });
      if (entries.length > limit) {
        shown.push(`<span class="badge more-action">+${formatNumber(entries.length - limit)}</span>`);
      }
      return shown.join("");
    }

    function actionSummaryText(node, limit) {
      const entries = actionEntries(node);
      if (!entries.length) return "";
      const shown = entries.slice(0, limit).map(([name, count]) => `${name}${count > 1 ? ` x${formatNumber(count)}` : ""}`);
      const hidden = entries.length - shown.length;
      return `ActionType: ${shown.join(", ")}${hidden > 0 ? `, +${formatNumber(hidden)}` : ""}`;
    }


    function parseSearchTerms(raw) {
      const seen = new Set();
      return String(raw || "")
        .split(/[\n,;]+/)
        .map((term) => term.trim())
        .filter(Boolean)
        .filter((term) => {
          const key = term.toLowerCase();
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
    }

    function nodeMatchesTerms(node, terms, mode) {
      if (!terms.length) return true;
      const haystack = nodeSearchText(node);
      const normalizedTerms = terms.map((term) => term.toLowerCase());
      if (mode === "and") return normalizedTerms.every((term) => haystack.includes(term));
      return normalizedTerms.some((term) => haystack.includes(term));
    }

    function termClass(index) {
      return `term-${index % 8}`;
    }

    function buildHighlightRanges(text, terms) {
      const source = String(text || "");
      if (!source || !terms || !terms.length) return [];
      const lowerSource = source.toLowerCase();
      const order = terms
        .map((term, index) => ({ term, index, lower: term.toLowerCase() }))
        .filter((entry) => entry.lower)
        .sort((a, b) => b.lower.length - a.lower.length || a.index - b.index);
      const owner = new Array(source.length).fill(-1);
      for (const entry of order) {
        let fromIndex = 0;
        while (fromIndex < lowerSource.length) {
          const found = lowerSource.indexOf(entry.lower, fromIndex);
          if (found === -1) break;
          const end = found + entry.lower.length;
          let occupied = false;
          for (let i = found; i < end; i += 1) {
            if (owner[i] !== -1) {
              occupied = true;
              break;
            }
          }
          if (!occupied) {
            for (let i = found; i < end; i += 1) owner[i] = entry.index;
          }
          fromIndex = found + Math.max(1, entry.lower.length);
        }
      }
      const ranges = [];
      let start = -1;
      let current = -1;
      for (let i = 0; i < owner.length; i += 1) {
        if (owner[i] !== current) {
          if (current !== -1) ranges.push({ start, end: i, index: current });
          current = owner[i];
          start = current !== -1 ? i : -1;
        }
      }
      if (current !== -1) ranges.push({ start, end: owner.length, index: current });
      return ranges;
    }

    function highlightText(text, terms) {
      const source = String(text || "");
      if (!source) return "";
      const ranges = buildHighlightRanges(source, terms);
      if (!ranges.length) return escapeHtml(source);
      const html = [];
      let cursor = 0;
      for (const range of ranges) {
        if (cursor < range.start) html.push(escapeHtml(source.slice(cursor, range.start)));
        html.push(`<mark class="term-highlight ${termClass(range.index)}">${escapeHtml(source.slice(range.start, range.end))}</mark>`);
        cursor = range.end;
      }
      if (cursor < source.length) html.push(escapeHtml(source.slice(cursor)));
      return html.join("");
    }

    function nodeMatchedTerms(node) {
      if (!state.visibleMatches || !state.visibleMatches.terms || !state.visibleMatches.terms.length) return [];
      const haystack = nodeSearchText(node);
      return state.visibleMatches.terms.filter((term) => haystack.includes(term.toLowerCase()));
    }

    function renderMatchedTermBadges(node, limit) {
      const matchedTerms = nodeMatchedTerms(node);
      if (!matchedTerms.length) return "";
      const shown = matchedTerms.slice(0, limit).map((term, index) => {
        const originalIndex = state.visibleMatches.terms.findIndex((entry) => entry.toLowerCase() === term.toLowerCase());
        return `<span class="term-chip ${termClass(originalIndex >= 0 ? originalIndex : index)}">${escapeHtml(term)}</span>`;
      });
      if (matchedTerms.length > limit) {
        shown.push(`<span class="badge more-action">+${formatNumber(matchedTerms.length - limit)}</span>`);
      }
      return `<div class="match-term-badges">${shown.join("")}</div>`;
    }

    function buildVisibleMatches(query, mode) {
      const terms = parseSearchTerms(query);
      if (!terms.length) return null;
      const matches = new Set();
      const visible = new Set();
      const expandedDescendants = new Set();
      for (const node of state.graph.nodes) {
        if (!nodeMatchesTerms(node, terms, mode)) continue;
        matches.add(node.id);

        let current = node;
        while (current) {
          visible.add(current.id);
          current = current.parentId != null ? state.nodeById.get(current.parentId) : null;
        }

        const stack = [node.id];
        while (stack.length) {
          const currentId = stack.pop();
          if (expandedDescendants.has(currentId)) continue;
          expandedDescendants.add(currentId);
          visible.add(currentId);
          const currentNode = state.nodeById.get(currentId);
          if (!currentNode) continue;
          for (const childId of currentNode.children || []) stack.push(childId);
        }
      }
      return { terms, mode, matches, visible };
    }

    function visibleChildren(node) {
      const mode = els.sortMode.value;
      let children = node.children.map((id) => state.nodeById.get(id)).filter(Boolean);
      if (state.visibleMatches) children = children.filter((child) => state.visibleMatches.visible.has(child.id));
      children.sort((a, b) => compareNodes(a, b, mode));
      return children;
    }

    function renderTree() {
      if (!state.graph) return;
      state.search = els.searchInput.value.trim();
      state.visibleMatches = buildVisibleMatches(state.search, els.searchMode.value);
      const roots = state.graph.roots
        .map((id) => state.nodeById.get(id))
        .filter(Boolean)
        .filter((node) => !state.visibleMatches || state.visibleMatches.visible.has(node.id))
        .sort((a, b) => compareNodes(a, b, els.sortMode.value));

      if (!roots.length) {
        els.treeScroll.innerHTML = `<div class="empty">検索条件に一致するノードはありません。</div>`;
        return;
      }

      const html = `<ul class="tree-root-list">${roots.map((node) => renderNode(node, 0)).join("")}</ul>`;
      els.treeScroll.innerHTML = html;
      bindTreeEvents();
    }

    function renderNode(node, depth) {
      const children = visibleChildren(node);
      const expandable = children.length > 0;
      const isExpanded = state.expanded.has(node.id) || Boolean(state.visibleMatches);
      const selected = state.selectedId === node.id;
      const matched = state.visibleMatches && state.visibleMatches.matches.has(node.id);
      const matchedTerms = matched ? nodeMatchedTerms(node) : [];
      const rowClass = [
        "node-row",
        node.inferred ? "inferred" : "",
        node.rootGroup ? "root" : "",
        selected ? "selected" : ""
      ].filter(Boolean).join(" ");
      const confidence = node.parentConfidence ? `${Math.round(node.parentConfidence * 100)}%` : "";
      const badges = [
        node.rootGroup ? `<span class="badge root">集約</span>` : "",
        node.inferred ? `<span class="badge inferred">推定</span>` : "",
        matched ? `<span class="badge">match</span>` : "",
        node.eventCount ? `<span class="badge">${formatNumber(node.eventCount)} evt</span>` : "",
        renderActionBadges(node, 3),
        children.length ? `<span class="badge">${formatNumber(node.childCount)} child</span>` : "",
        confidence ? `<span class="badge">${confidence}</span>` : ""
      ].filter(Boolean).join("");
      const meta = [
        node.deviceLabel,
        node.pid ? `PID ${node.pid}` : "",
        node.creationTime ? `created ${node.creationTime}` : "",
        node.firstSeen ? `first ${node.firstSeen}` : ""
      ].filter(Boolean).join(" / ");
      const actionSummary = actionSummaryText(node, 6);
      const sub = [actionSummary, node.commandLine || node.path || node.parentReason || ""].filter(Boolean).join(" | ");
      const limit = Number(els.childLimit.value);
      const reveal = state.childReveal.get(node.id) || limit;
      const shown = children.slice(0, reveal);
      const hiddenCount = Math.max(0, children.length - shown.length);
      const childHtml = expandable && isExpanded
        ? `<ul class="children">${shown.map((child) => renderNode(child, depth + 1)).join("")}</ul>${hiddenCount ? `<div class="more-row"><button class="button ghost" data-more="${node.id}" type="button">さらに ${formatNumber(Math.min(limit, hiddenCount))} 件表示</button></div>` : ""}`
        : "";
      return `
        <li class="tree-node" data-id="${node.id}">
          <div class="${rowClass}" data-select="${node.id}">
            <button class="twisty" type="button" data-toggle="${node.id}" ${expandable ? "" : "disabled"} title="${isExpanded ? "折りたたみ" : "展開"}">
              ${expandable ? (isExpanded ? "⌄" : "›") : ""}
            </button>
            <div class="node-main">
              <div class="node-title">
                <span class="proc-name">${highlightText(node.name, matchedTerms)}</span>
              </div>
              <div class="node-meta">${highlightText(meta || "no metadata", matchedTerms)}</div>
              <div class="node-sub">${highlightText(sub, matchedTerms)}</div>
              ${matched ? renderMatchedTermBadges(node, 6) : ""}
            </div>
            <div class="badges">${badges}</div>
          </div>
          ${childHtml}
        </li>
      `;
    }

    function bindTreeEvents() {
      els.treeScroll.querySelectorAll("[data-toggle]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const id = Number(button.dataset.toggle);
          if (state.expanded.has(id)) state.expanded.delete(id);
          else state.expanded.add(id);
          renderTree();
        });
      });
      els.treeScroll.querySelectorAll("[data-select]").forEach((row) => {
        row.addEventListener("click", () => {
          const nextId = Number(row.dataset.select);
          if (state.selectedId !== nextId) {
            state.detailEventLimit = 400;
            resetSelectedEvent();
          }
          state.selectedId = nextId;
          renderDetails();
          renderTree();
        });
      });
      els.treeScroll.querySelectorAll("[data-more]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const id = Number(button.dataset.more);
          const current = state.childReveal.get(id) || Number(els.childLimit.value);
          state.childReveal.set(id, current + Number(els.childLimit.value));
          renderTree();
        });
      });
    }

    function singleEventRow(node) {
      const groups = node.eventRowsByAction || {};
      let onlyRow = null;
      let count = 0;
      for (const rows of Object.values(groups)) {
        for (const rowNumber of rows || []) {
          onlyRow = rowNumber;
          count += 1;
          if (count > 1) return null;
        }
      }
      return count === 1 ? onlyRow : null;
    }

    function renderEventRows(node) {
      const groups = node.eventRowsByAction || {};
      const entries = actionEntries(node);
      const totalRows = entries.reduce((sum, [action]) => sum + ((groups[action] || []).length), 0);
      if (!totalRows) {
        return `
          <div class="details-subhead">Event Rows</div>
          <div class="notice">このノードに紐づくイベント行はありません。</div>
        `;
      }

      let remaining = state.detailEventLimit;
      let shownTotal = 0;
      const html = [];
      for (const [action, count] of entries) {
        if (remaining <= 0) break;
        const rows = groups[action] || [];
        const shownRows = rows.slice(0, remaining);
        remaining -= shownRows.length;
        shownTotal += shownRows.length;
        html.push(`
          <div class="event-group">
            <div class="event-group-head">
              <div class="event-action" title="${escapeHtml(action)}">${escapeHtml(action)}</div>
              <span class="badge action">${formatNumber(count)} evt</span>
            </div>
            <div class="event-row-chips">
              ${shownRows.map((rowNumber) => `<button class="row-chip ${state.selectedEventRow === rowNumber ? "selected" : ""}" type="button" data-event-row="${rowNumber}">#${formatNumber(rowNumber)}</button>`).join("")}
            </div>
          </div>
        `);
      }

      const hiddenTotal = Math.max(0, totalRows - shownTotal);
      return `
        <div class="details-subhead">Event Rows</div>
        <div class="event-groups">${html.join("")}</div>
        ${hiddenTotal ? `<button class="button ghost" type="button" data-more-events>さらに ${formatNumber(Math.min(400, hiddenTotal))} 件表示</button>` : ""}
      `;
    }

    function renderSelectedEventData() {
      const rowNumber = state.selectedEventRow;
      if (!rowNumber) {
        return `
          <div class="details-subhead">Selected Event Data</div>
          <div class="notice">行番号を選択すると、そのイベントの全列データを表示します。</div>
        `;
      }

      if (state.selectedEventLoading) {
        return `
          <div class="details-subhead">Selected Event Data</div>
          <div class="notice">行 #${formatNumber(rowNumber)} を読み込み中です。</div>
        `;
      }

      if (state.selectedEventError) {
        return `
          <div class="details-subhead">Selected Event Data</div>
          <div class="notice danger">${escapeHtml(state.selectedEventError)}</div>
        `;
      }

      const data = state.selectedEventData;
      if (!data || data.rowNumber !== rowNumber) {
        return `
          <div class="details-subhead">Selected Event Data</div>
          <div class="notice">行 #${formatNumber(rowNumber)} のデータはまだ読み込まれていません。</div>
        `;
      }

      return `
        <div class="raw-event">
          <div class="details-subhead">Selected Event Data: #${formatNumber(rowNumber)}</div>
          <div class="raw-field-list">
            ${data.columns.map((column) => `
              <div class="raw-field">
                <div class="raw-key">
                  <strong>${escapeHtml(column.name)}</strong>
                  <span class="raw-index">Column ${formatNumber(column.index)}</span>
                </div>
                <div class="raw-value mono">${escapeHtml(column.value || "")}</div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function loadEventRow(rowNumber) {
      if (!state.file) return;
      if (state.rowWorker) {
        state.rowWorker.terminate();
        if (state.rowWorker.revokeObjectUrl) state.rowWorker.revokeObjectUrl();
        state.rowWorker = null;
      }

      const requestId = state.rowRequestId + 1;
      state.rowRequestId = requestId;
      state.selectedEventRow = rowNumber;
      state.selectedEventData = null;
      state.selectedEventLoading = true;
      state.selectedEventError = "";
      renderDetails();

      const worker = createWorker();
      state.rowWorker = worker;

      worker.onmessage = (event) => {
        const message = event.data;
        if (requestId !== state.rowRequestId) return;
        if (message.type === "rowResult") {
          state.selectedEventData = message;
          state.selectedEventLoading = false;
          state.selectedEventError = "";
        } else if (message.type === "rowError") {
          state.selectedEventData = null;
          state.selectedEventLoading = false;
          state.selectedEventError = message.message || "イベント行の読み込みに失敗しました。";
        }
        if (state.rowWorker === worker) {
          worker.terminate();
          state.rowWorker = null;
        }
        renderDetails();
      };

      worker.onerror = (error) => {
        if (requestId !== state.rowRequestId) return;
        state.selectedEventData = null;
        state.selectedEventLoading = false;
        state.selectedEventError = error.message || "イベント行の読み込みに失敗しました。";
        if (state.rowWorker === worker) {
          worker.terminate();
          if (worker.revokeObjectUrl) worker.revokeObjectUrl();
          state.rowWorker = null;
        }
        renderDetails();
      };

      worker.postMessage({
        type: "readRow",
        file: state.file,
        config: {
          delimiter: state.delimiter,
          encoding: state.encoding,
          rowNumber
        }
      });
    }

    function renderDetails() {
      const node = state.nodeById.get(state.selectedId);
      if (!node) {
        els.detailsBody.innerHTML = `<div class="empty">ノードを選択すると詳細を表示します。</div>`;
        return;
      }
      const autoEventRow = !state.selectedEventRow && !state.selectedEventLoading ? singleEventRow(node) : null;
      const actions = Object.entries(node.actionTypes || {})
        .sort((a, b) => b[1] - a[1])
        .map(([name, count]) => `${name} (${formatNumber(count)})`)
        .join(", ");
      const parent = node.parentId != null ? state.nodeById.get(node.parentId) : null;
      const rows = [
        ["Device", node.deviceLabel || node.deviceId],
        ["PID", node.pid],
        ["Unique", node.uniqueId],
        ["Created", node.creationTime],
        ["First", node.firstSeen],
        ["Last", node.lastSeen],
        ["User", node.account],
        ["Path", node.path],
        ["Command", node.commandLine],
        ["Parent", parent ? `${parent.name}${parent.pid ? ` (PID ${parent.pid})` : ""}` : "なし"],
        ["Reason", node.parentReason],
        ["Confidence", node.parentConfidence ? `${Math.round(node.parentConfidence * 100)}%` : ""],
        ["Events", formatNumber(node.eventCount)],
        ["Children", `${formatNumber(node.childCount)} direct / ${formatNumber(node.descendantCount)} descendants`],
        ["Actions", actions]
      ];
      els.detailsBody.innerHTML = `
        <div class="detail-title">
          <strong>${escapeHtml(node.name)}</strong>
          <span class="hint">${escapeHtml(node.inferred ? "推定または集約ノード" : "ログ内で観測されたプロセス")}</span>
        </div>
        <div class="kv">
          ${rows.map(([key, value]) => `
            <div class="kv-row">
              <div class="kv-key">${escapeHtml(key)}</div>
              <div class="kv-value ${key === "Command" || key === "Path" || key === "Unique" ? "mono" : ""}">${escapeHtml(value || "-")}</div>
            </div>
          `).join("")}
        </div>
        ${renderEventRows(node)}
        ${renderSelectedEventData()}
      `;
      els.detailsBody.querySelectorAll("[data-event-row]").forEach((button) => {
        button.addEventListener("click", () => {
          loadEventRow(Number(button.dataset.eventRow));
        });
      });
      const moreButton = els.detailsBody.querySelector("[data-more-events]");
      if (moreButton) {
        moreButton.addEventListener("click", () => {
          state.detailEventLimit += 400;
          renderDetails();
        });
      }
      if (autoEventRow) loadEventRow(autoEventRow);
    }

    function expandAll() {
      if (!state.graph) return;
      for (const node of state.graph.nodes) {
        if (node.children.length) state.expanded.add(node.id);
      }
      renderTree();
    }

    function collapseAll() {
      if (!state.graph) return;
      state.expanded = new Set();
      renderTree();
    }

    function downloadText(filename, text, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      const text = String(value == null ? "" : value);
      if (/[",\r\n]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
      return text;
    }

    function exportCsv() {
      if (!state.graph) return;
      const lines = [[
        "parent_id", "parent_name", "parent_pid", "child_id", "child_name", "child_pid",
        "device", "confidence", "reason", "child_first_seen", "child_command_line"
      ].join(",")];
      for (const child of state.graph.nodes) {
        if (child.parentId == null) continue;
        const parent = state.nodeById.get(child.parentId);
        lines.push([
          parent.id,
          parent.name,
          parent.pid,
          child.id,
          child.name,
          child.pid,
          child.deviceLabel,
          child.parentConfidence,
          child.parentReason,
          child.firstSeen,
          child.commandLine
        ].map(csvEscape).join(","));
      }
      downloadText("process-tree-edges.csv", lines.join("\r\n"), "text/csv;charset=utf-8");
    }

    function exportJson() {
      if (!state.graph) return;
      downloadText("process-tree.json", JSON.stringify(state.graph, null, 2), "application/json;charset=utf-8");
    }

    function sampleCsv() {
      return [

    function debounce(fn, wait) {
      let timer = 0;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), wait);
      };
    }

    els.fileInput.addEventListener("change", () => {
      const file = els.fileInput.files && els.fileInput.files[0];
      if (file) loadFile(file);
    });

    for (const eventName of ["dragenter", "dragover"]) {
      els.dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        els.dropZone.classList.add("dragging");
      });
    }

    for (const eventName of ["dragleave", "drop"]) {
      els.dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        els.dropZone.classList.remove("dragging");
      });
    }

    els.dropZone.addEventListener("drop", (event) => {
      const file = event.dataTransfer.files && event.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    els.detailsResizer.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      beginDetailsResize(event.clientX);
    });
    els.detailsResizer.addEventListener("dblclick", () => {
      resetDetailsWidth();
    });
    els.detailsResizer.addEventListener("keydown", (event) => {
      if (window.matchMedia("(max-width: 1180px)").matches) return;
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        applyDetailsWidth((state.detailsWidth || els.detailsPane.getBoundingClientRect().width) + 24);
      } else if (event.key === "ArrowRight") {
        event.preventDefault();
        applyDetailsWidth((state.detailsWidth || els.detailsPane.getBoundingClientRect().width) - 24);
      } else if (event.key === "Home") {
        event.preventDefault();
        applyDetailsWidth(detailsResizeBounds().minWidth);
      } else if (event.key === "End") {
        event.preventDefault();
        applyDetailsWidth(detailsResizeBounds().maxWidth);
      }
    });
    window.addEventListener("resize", () => {
      if (window.matchMedia("(max-width: 1180px)").matches) {
        document.documentElement.style.removeProperty("--details-width");
      } else {
        applyDetailsWidth(state.detailsWidth);
      }
    });

    els.analyzeButton.addEventListener("click", startAnalysis);
    els.cancelButton.addEventListener("click", stopAnalysis);
    els.expandButton.addEventListener("click", expandAll);
    els.collapseButton.addEventListener("click", collapseAll);
    els.searchInput.addEventListener("input", debounce(renderTree, 160));
    els.searchMode.addEventListener("change", renderTree);
    els.sortMode.addEventListener("change", renderTree);
    els.childLimit.addEventListener("change", () => {
      state.childReveal.clear();
      renderTree();
    });
    els.encodingSelect.addEventListener("change", async () => {
      if (!state.file || state.worker) return;
      await loadFile(state.file);
    });
    els.exportCsvButton.addEventListener("click", exportCsv);
    els.exportJsonButton.addEventListener("click", exportJson);
    els.sampleButton.addEventListener("click", async () => {
      const file = new File([sampleCsv()], "sample-mde-process-events.csv", { type: "text/csv" });
      await loadFile(file);
      startAnalysis();
    });

    resetDetailsWidth();
    renderMapping();
  </script>
</body>
</html>
