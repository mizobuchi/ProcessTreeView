
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MDE Process Tree Builder</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --panel: #ffffff;
      --panel-2: #eef2f5;
      --line: #d7dde3;
      --line-strong: #b7c1cb;
      --text: #18212b;
      --muted: #5f6b78;
      --muted-2: #7a8794;
      --accent: #1264a3;
      --accent-2: #0a7f71;
      --warn: #a75b00;
      --danger: #b3261e;
      --root: #5c4b99;
      --shadow: 0 12px 34px rgba(22, 34, 48, 0.11);
      --details-width: 340px;
      --details-min-width: 280px;
      --splitter-size: 10px;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Yu Gothic UI", "Meiryo", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #16293d;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    h1 {
      font-size: 18px;
      line-height: 1.2;
      margin: 0;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 380px) minmax(0, 1fr) var(--splitter-size) minmax(var(--details-min-width), var(--details-width));
      gap: 0;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    aside,
    main {
      min-width: 0;
      min-height: 0;
    }

    .details-resizer {
      width: var(--splitter-size);
      min-width: var(--splitter-size);
      cursor: col-resize;
      background: linear-gradient(to right, transparent 0, transparent 3px, var(--line) 3px, var(--line) 7px, transparent 7px, transparent 100%);
      position: relative;
      z-index: 5;
      touch-action: none;
    }

    .details-resizer:hover,
    .details-resizer:focus-visible,
    .app.resizing .details-resizer {
      background: linear-gradient(to right, transparent 0, transparent 3px, var(--accent) 3px, var(--accent) 7px, transparent 7px, transparent 100%);
      outline: none;
    }

    .app.resizing,
    .app.resizing * {
      cursor: col-resize !important;
      user-select: none !important;
    }

    .sidebar,
    .details {
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow: auto;
      min-height: 0;
    }

    .details {
      border-right: 0;
      border-left: 1px solid var(--line);
      align-self: stretch;
    }

    .details .panel-section {
      min-height: 100%;
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-section h2,
    .tree-head h2,
    .details h2 {
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin: 0 0 12px;
    }

    .file-drop {
      display: grid;
      gap: 10px;
      place-items: center;
      min-height: 124px;
      padding: 16px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      background: var(--panel-2);
      text-align: center;
    }

    .file-drop.dragging {
      border-color: var(--accent);
      background: #e6f2fb;
    }

    .file-drop input {
      inline-size: 100%;
      max-inline-size: 280px;
    }

    .file-name {
      font-size: 13px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .button,
    .icon-button {
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      min-height: 34px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 650;
    }

    .button.ghost {
      background: transparent;
    }

    .button:disabled,
    .icon-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .icon-button {
      width: 36px;
      padding: 0;
      flex: 0 0 auto;
    }

    .button:hover:not(:disabled),
    .icon-button:hover:not(:disabled) {
      border-color: var(--accent);
      background: #eef7fd;
    }

    .button.primary:hover:not(:disabled) {
      background: #0d548a;
    }

    .icon {
      width: 17px;
      height: 17px;
      display: inline-block;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mapping-grid,
    .settings-grid {
      display: grid;
      gap: 9px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 130px 1fr;
      align-items: center;
      gap: 10px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    select,
    input[type="search"],
    input[type="number"],
    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      min-height: 34px;
      padding: 6px 9px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 56px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .checkbox-row {
      display: grid;
      grid-template-columns: 16px 1fr;
      gap: 8px;
      align-items: center;
    }

    .progress-wrap {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .progress {
      overflow: hidden;
      height: 8px;
      border-radius: 999px;
      background: #dce3ea;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--accent-2);
      transition: width 140ms ease;
    }

    .progress-text,
    .hint,
    .stat-caption {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .status-list {
      display: grid;
      gap: 8px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      min-width: 0;
    }

    .stat-value {
      display: block;
      font-size: 19px;
      font-weight: 750;
      line-height: 1.1;
    }

    .tree-pane {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      height: 100%;
      background: #fbfcfd;
      overflow: hidden;
    }

    .tree-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      display: grid;
      gap: 12px;
    }

    .tree-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: start;
    }

    .search-stack {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .search-row {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .tree-tools-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .tree-scroll {
      overflow: auto;
      padding: 12px 14px 24px;
      min-height: 0;
    }

    .empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      background: #fff;
      padding: 24px;
    }

    .tree-root-list,
    .children {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .tree-root-list {
      display: grid;
      gap: 5px;
    }

    .tree-node {
      margin: 0;
    }

    .node-row {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 5px 7px;
      background: #fff;
    }

    .node-row:hover {
      border-color: var(--line-strong);
      box-shadow: 0 2px 10px rgba(20, 35, 52, 0.05);
    }

    .node-row.selected {
      border-color: var(--accent);
      background: #eef7fd;
    }

    .node-row.inferred {
      background: #fff9ef;
    }

    .node-row.root {
      background: #f7f4ff;
    }

    .twisty {
      width: 26px;
      height: 26px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      padding: 0;
    }

    .twisty:hover {
      background: rgba(18, 100, 163, 0.08);
      color: var(--accent);
    }

    .node-main {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .node-title {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .proc-name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .node-meta,
    .node-sub {
      font-size: 12px;
      color: var(--muted);
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-sub {
      color: var(--muted-2);
    }

    .badges {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      font-size: 11px;
      line-height: 1;
      color: var(--muted);
      border: 1px solid var(--line);
      background: #fff;
      white-space: nowrap;
    }

    .badge.inferred {
      color: var(--warn);
      border-color: #e2c189;
      background: #fff4df;
    }

    .badge.root {
      color: var(--root);
      border-color: #c6bce6;
      background: #f0ebff;
    }

    .badge.warn {
      color: var(--danger);
      border-color: #e6b7b3;
      background: #fff0ef;
    }

    .badge.action {
      color: #075f56;
      border-color: #a8d6cc;
      background: #edf9f6;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge.more-action {
      color: #4d6073;
      border-color: #c9d3dd;
      background: #f3f6f8;
    }

    .children {
      margin-left: 21px;
      padding-left: 13px;
      border-left: 1px solid var(--line);
      display: grid;
      gap: 5px;
      margin-top: 5px;
    }

    .more-row {
      margin: 4px 0 2px 34px;
    }

    .details-body {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .detail-title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .detail-title strong {
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .kv {
      display: grid;
      gap: 7px;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 104px 1fr;
      gap: 10px;
      align-items: start;
      min-width: 0;
    }

    .kv-key {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .kv-value {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 13px;
      line-height: 1.45;
    }

    .details-subhead {
      font-size: 12px;
      line-height: 1.2;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }

    .event-groups {
      display: grid;
      gap: 8px;
    }

    .event-group {
      display: grid;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fff;
      min-width: 0;
    }

    .event-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .event-action {
      font-weight: 700;
      font-size: 13px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .event-row-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      max-height: 180px;
      overflow: auto;
    }

    .row-chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 6px;
      border: 1px solid #cfd8e1;
      background: #f8fafb;
      padding: 0 6px;
      font-size: 12px;
      color: #293847;
      cursor: pointer;
    }

    .row-chip:hover,
    .row-chip.selected {
      border-color: var(--accent);
      background: #eef7fd;
      color: var(--accent);
    }

    .raw-event {
      display: grid;
      gap: 8px;
    }

    .raw-field-list {
      display: grid;
      gap: 6px;
    }

    .raw-field {
      display: grid;
      grid-template-columns: minmax(112px, 38%) minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
      min-width: 0;
    }

    .raw-key {
      display: grid;
      gap: 2px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .raw-key strong {
      color: var(--text);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .raw-index {
      color: var(--muted-2);
      font-size: 11px;
    }

    .raw-value {
      min-width: 0;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.45;
    }

    .mono {
      font-family: "Cascadia Mono", Consolas, "SFMono-Regular", monospace;
    }

    .notice {
      border: 1px solid #edd39f;
      background: #fff7e7;
      color: #684100;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 13px;
      line-height: 1.45;
    }

    .notice.danger {
      border-color: #edb8b3;
      background: #fff0ef;
      color: #771a14;
    }


    .term-highlight {
      display: inline;
      border-radius: 4px;
      padding: 0 2px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      font-weight: 700;
    }

    .term-highlight.term-0,
    .term-chip.term-0 {
      background: #fff1a8;
      color: #4a4100;
    }

    .term-highlight.term-1,
    .term-chip.term-1 {
      background: #c8f7c5;
      color: #155724;
    }

    .term-highlight.term-2,
    .term-chip.term-2 {
      background: #cfe8ff;
      color: #0b4f88;
    }

    .term-highlight.term-3,
    .term-chip.term-3 {
      background: #f7d0ff;
      color: #7a1f87;
    }

    .term-highlight.term-4,
    .term-chip.term-4 {
      background: #ffd8b5;
      color: #8a3d00;
    }

    .term-highlight.term-5,
    .term-chip.term-5 {
      background: #d9f2e6;
      color: #0f5c46;
    }

    .term-highlight.term-6,
    .term-chip.term-6 {
      background: #ffd6de;
      color: #8f1233;
    }

    .term-highlight.term-7,
    .term-chip.term-7 {
      background: #e3dcff;
      color: #4f34a3;
    }

    .match-term-badges {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .term-chip {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      font-size: 11px;
      line-height: 1;
      border: 1px solid rgba(0, 0, 0, 0.08);
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .split-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 340px 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
      }

      .details-resizer {
        display: none;
      }

      .details {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
        max-height: min(360px, 38vh);
      }

      .details .panel-section {
        min-height: 0;
      }
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        white-space: normal;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        height: auto;
        overflow: visible;
      }

      .details-resizer {
        display: none;
      }

      .sidebar,
      .details {
        border-right: 0;
        border-left: 0;
        max-height: none;
        overflow: visible;
      }

      .tree-pane {
        height: auto;
        min-height: 620px;
        overflow: visible;
      }

      .tree-scroll {
        max-height: 70vh;
      }

      .tree-toolbar {
        grid-template-columns: 1fr;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .field-row,
      .kv-row,
      .raw-field {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">PT</div>
        <h1>MDE Process Tree Builder</h1>
      </div>
      <div class="top-actions">
        <button class="button ghost" id="sampleButton" type="button" title="サンプルログで動作確認">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/></svg>
          サンプル
        </button>
        <button class="button" id="exportCsvButton" type="button" disabled title="表示中のエッジをCSVで保存">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          Edge CSV
        </button>
        <button class="button" id="exportJsonButton" type="button" disabled title="表示中のツリーをJSONで保存">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          JSON
        </button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <section class="panel-section">
          <h2>Import</h2>
          <div class="file-drop" id="dropZone">
            <input id="fileInput" type="file" accept=".csv,.tsv,.txt,.log,text/csv,text/tab-separated-values">
            <div class="file-name" id="fileName">CSV / TSV形式のMDEログを選択</div>
          </div>
          <div class="progress-wrap">
            <div class="progress" aria-label="解析進捗">
              <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">待機中</div>
          </div>
        </section>

        <section class="panel-section">
          <h2>Column Mapping</h2>
          <div class="mapping-grid" id="mappingGrid"></div>
          <p class="hint">列名から自動判定します。MDEの <span class="mono">FileName</span>、<span class="mono">ProcessId</span>、<span class="mono">InitiatingProcess*</span> 系を優先します。</p>
        </section>

        <section class="panel-section">
          <h2>Settings</h2>

  <script id="worker-source" type="text/plain">
    const FIELD_DEFS = [
      { key: "timestamp", label: "イベント時刻" },
      { key: "deviceName", label: "デバイス名" },
      { key: "deviceId", label: "デバイスID" },
      { key: "processUniqueId", label: "プロセス一意ID" },
      { key: "processName", label: "プロセス名" },
      { key: "processPid", label: "PID" },
      { key: "processCreationTime", label: "プロセス作成時刻" },
      { key: "processPath", label: "パス" },
      { key: "processCommandLine", label: "コマンドライン" },
      { key: "account", label: "アカウント" },
      { key: "parentUniqueId", label: "親一意ID" },
      { key: "parentName", label: "親プロセス名" },
      { key: "parentPid", label: "親PID" },
      { key: "parentCreationTime", label: "親作成時刻" },
      { key: "parentPath", label: "親パス" },
      { key: "parentCommandLine", label: "親コマンドライン" },
      { key: "actionType", label: "ActionType" }
    ];

    function normalizeHeader(value) {
      return String(value || "")
        .trim()
        .replace(/^\uFEFF/, "")
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function stableHash(input) {
      let hash = 2166136261;
      for (let i = 0; i < input.length; i += 1) {
        hash ^= input.charCodeAt(i);
        hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
      }
      return (hash >>> 0).toString(36);
    }

    function compactTime(value) {
      if (!value) return "";
      const text = String(value).trim();
      const ms = Date.parse(text);
      if (Number.isFinite(ms)) return new Date(ms).toISOString();
      return text;
    }

    function timeMs(value) {
      if (!value) return NaN;
      const ms = Date.parse(value);
      return Number.isFinite(ms) ? ms : NaN;
    }

    function lower(value) {
      return String(value || "").trim().toLowerCase();
    }

    function clean(value) {
      return String(value == null ? "" : value).trim();
    }

    function shortNameFromPath(path) {
      const text = clean(path);
      if (!text) return "";
      const parts = text.split(/[\\/]/);
      return parts[parts.length - 1] || text;
    }

    function pickBetter(current, incoming, preferLong) {
      const next = clean(incoming);
      if (!next) return current || "";
      if (!current || /^\[(unknown|推定親|親不明)\]$/i.test(current)) return next;
      if (preferLong) return next.length > current.length ? next : current;
      return current;
    }

    function makeDevice(row, map) {
      const name = clean(row[map.deviceName]);
      const id = clean(row[map.deviceId]);
      return {
        name,
        id,
        key: id || name || "unknown-device",
        label: name || id || "unknown device"
      };
    }

    function makeProcessKey(deviceKey, values) {
      if (values.uniqueId) return `${deviceKey}|uid|${values.uniqueId}`;
      if (values.pid && values.creationTime) return `${deviceKey}|pidct|${values.pid}|${compactTime(values.creationTime)}`;
      if (values.pid && values.name && values.commandLine) {
        return `${deviceKey}|pidsig|${values.pid}|${lower(values.name)}|${stableHash(lower(values.commandLine))}`;
      }
      if (values.pid && values.name && values.path) {
        return `${deviceKey}|pidsig|${values.pid}|${lower(values.name)}|${stableHash(lower(values.path))}`;
      }
      if (values.pid && values.name) return `${deviceKey}|pidname|${values.pid}|${lower(values.name)}`;
      const signature = [values.name, values.path, values.commandLine, values.timestamp].map(lower).join("|");
      return `${deviceKey}|sig|${stableHash(signature)}`;
    }

    function makeParentSignature(deviceKey, parent) {
      if (parent.uniqueId) return `${deviceKey}|uid|${parent.uniqueId}`;
      if (parent.pid && parent.creationTime) return `${deviceKey}|pidct|${parent.pid}|${compactTime(parent.creationTime)}`;
      if (parent.pid && parent.name && parent.commandLine) {
        return `${deviceKey}|infer|${parent.pid}|${lower(parent.name)}|${stableHash(lower(parent.commandLine))}`;
      }
      if (parent.pid && parent.name && parent.path) {
        return `${deviceKey}|infer|${parent.pid}|${lower(parent.name)}|${stableHash(lower(parent.path))}`;
      }
      if (parent.pid && parent.name) return `${deviceKey}|infer|${parent.pid}|${lower(parent.name)}`;
      if (parent.pid) return `${deviceKey}|infer-pid|${parent.pid}`;
      if (parent.name) return `${deviceKey}|infer-name|${lower(parent.name)}|${stableHash(lower(parent.commandLine || parent.path))}`;
      return `${deviceKey}|unknown-parent`;
    }

    function createNode(id, key, values, inferred) {
      const name = values.name || shortNameFromPath(values.path) || (inferred ? "[推定親]" : "[unknown]");
      return {
        id,
        key,
        deviceKey: values.deviceKey || "",
        deviceLabel: values.deviceLabel || "",
        deviceId: values.deviceId || "",
        name,
        pid: values.pid || "",
        uniqueId: values.uniqueId || "",
        creationTime: compactTime(values.creationTime || ""),
        firstSeen: compactTime(values.timestamp || values.creationTime || ""),
        lastSeen: compactTime(values.timestamp || values.creationTime || ""),
        path: values.path || "",
        commandLine: values.commandLine || "",
        account: values.account || "",
        eventCount: inferred ? 0 : 1,
        actionTypes: Object.create(null),
        eventRowsByAction: Object.create(null),
        parentCandidate: null,
        parentId: null,
        parentConfidence: 0,
        parentReason: "",
        inferred: Boolean(inferred),
        rootGroup: false,
        missing: Boolean(inferred),
        children: [],
        childCount: 0,
        descendantCount: 0,
        displayIndex: id
      };
    }

    function updateNode(node, values) {
      node.name = pickBetter(node.name, values.name || shortNameFromPath(values.path), false) || node.name;
      node.pid = pickBetter(node.pid, values.pid, false);
      node.uniqueId = pickBetter(node.uniqueId, values.uniqueId, false);
      node.creationTime = pickBetter(node.creationTime, compactTime(values.creationTime), false);
      node.path = pickBetter(node.path, values.path, true);
      node.commandLine = pickBetter(node.commandLine, values.commandLine, true);
      node.account = pickBetter(node.account, values.account, false);
      node.deviceLabel = pickBetter(node.deviceLabel, values.deviceLabel, false);
      node.deviceId = pickBetter(node.deviceId, values.deviceId, false);
      const ts = compactTime(values.timestamp);
      if (ts) {
        if (!node.firstSeen || timeMs(ts) < timeMs(node.firstSeen)) node.firstSeen = ts;
        if (!node.lastSeen || timeMs(ts) > timeMs(node.lastSeen)) node.lastSeen = ts;
      }
      if (!node.inferred) node.eventCount += 1;
    }

    function recordNodeEvent(node, values, rowNumber) {
      if (node.inferred) return;
      const actionType = values.actionType || "(ActionTypeなし)";
      node.actionTypes[actionType] = (node.actionTypes[actionType] || 0) + 1;
      if (!node.eventRowsByAction[actionType]) node.eventRowsByAction[actionType] = [];
      node.eventRowsByAction[actionType].push(rowNumber);
    }

    function createCsvParser(delimiter, onRow) {
      let field = "";
      let row = [];
      let inQuotes = false;
      let quotePending = false;

      function endField() {
        row.push(field);
        field = "";
      }

      function endRow() {
        endField();
        onRow(row);
        row = [];
      }

      function processChar(c) {
        if (inQuotes) {
          if (quotePending) {
            if (c === '"') {
              field += '"';
              quotePending = false;
              return;
            }
            inQuotes = false;
            quotePending = false;
          } else if (c === '"') {
            quotePending = true;
            return;
          } else {
            field += c;
            return;
          }
        }

        if (c === '"') {
          if (!field) inQuotes = true;
          else field += c;
        } else if (c === delimiter) {
          endField();
        } else if (c === "\n") {
          endRow();
        } else if (c === "\r") {
          return;
        } else {
          field += c;
        }
      }

      return {
        push(text) {
          for (let i = 0; i < text.length; i += 1) processChar(text[i]);
        },
        finish() {
          if (quotePending) quotePending = false;
          if (field.length || row.length) endRow();
        }
      };
    }

    function rowValue(row, index) {
      return Number.isInteger(index) && index >= 0 ? clean(row[index]) : "";
    }

    function eventValues(row, map) {
      const device = makeDevice(row, map);
      return {
        deviceKey: device.key,
        deviceLabel: device.label,
        deviceId: device.id,
        timestamp: rowValue(row, map.timestamp),
        uniqueId: rowValue(row, map.processUniqueId),
        name: rowValue(row, map.processName),
        pid: rowValue(row, map.processPid),
        creationTime: rowValue(row, map.processCreationTime),
        path: rowValue(row, map.processPath),
        commandLine: rowValue(row, map.processCommandLine),
        account: rowValue(row, map.account),
        actionType: rowValue(row, map.actionType)
      };
    }

    function parentValues(row, map, childValues) {
      const parent = {
        deviceKey: childValues.deviceKey,
        deviceLabel: childValues.deviceLabel,
        deviceId: childValues.deviceId,
        timestamp: childValues.timestamp,
        uniqueId: rowValue(row, map.parentUniqueId),
        name: rowValue(row, map.parentName),
        pid: rowValue(row, map.parentPid),
        creationTime: rowValue(row, map.parentCreationTime),
        path: rowValue(row, map.parentPath),
        commandLine: rowValue(row, map.parentCommandLine),
        account: ""
      };
      if (!parent.name && parent.path) parent.name = shortNameFromPath(parent.path);
      return parent;
    }

    function hasParentInfo(parent) {
      return Boolean(parent.uniqueId || parent.pid || parent.name || parent.path || parent.commandLine);
    }

    function hasChildIdentity(values) {
      return Boolean(values.uniqueId || values.pid || values.name || values.path || values.commandLine);
    }

    function addToIndex(index, key, nodeId) {
      if (!key) return;
      let bucket = index.get(key);
      if (!bucket) {
        bucket = [];
        index.set(key, bucket);
      }
      bucket.push(nodeId);
    }

    function buildIndexes(nodes) {
      const byPid = new Map();
      for (const node of nodes) {
        if (node.inferred || node.rootGroup || !node.pid) continue;
        const key = `${node.deviceKey}|${node.pid}`;
        addToIndex(byPid, key, node.id);
      }
      for (const ids of byPid.values()) {
        ids.sort((a, b) => {
          const am = timeMs(nodes[a].creationTime || nodes[a].firstSeen);
          const bm = timeMs(nodes[b].creationTime || nodes[b].firstSeen);
          return (Number.isFinite(am) ? am : 0) - (Number.isFinite(bm) ? bm : 0);
        });
      }
      return { byPid };
    }

    function chooseParentByTime(nodes, byPid, child, parent) {
      if (!parent.pid) return null;
      const ids = byPid.get(`${child.deviceKey}|${parent.pid}`);
      if (!ids || !ids.length) return null;
      const childTime = timeMs(child.creationTime || child.firstSeen);
      let best = null;
      let bestDelta = Infinity;
      for (const id of ids) {
        if (id === child.id) continue;
        const candidate = nodes[id];
        const candidateName = lower(candidate.name);
        if (parent.name && candidateName && candidateName !== lower(parent.name)) continue;
        const candidateTime = timeMs(candidate.creationTime || candidate.firstSeen);
        if (Number.isFinite(childTime) && Number.isFinite(candidateTime) && candidateTime > childTime) continue;
        const delta = Number.isFinite(childTime) && Number.isFinite(candidateTime)
          ? Math.abs(childTime - candidateTime)
          : 0;
        if (delta < bestDelta) {
          best = candidate;
          bestDelta = delta;
        }
      }
      return best;
    }

    function wouldCreateCycle(nodes, childId, parentId) {
      let current = parentId;
      const seen = new Set([childId]);
      while (current != null) {
        if (seen.has(current)) return true;
        seen.add(current);
        current = nodes[current] ? nodes[current].parentId : null;
      }
      return false;
    }

    function attach(nodes, child, parent, confidence, reason) {
      if (!parent || child.id === parent.id) return false;
      if (wouldCreateCycle(nodes, child.id, parent.id)) return false;
      child.parentId = parent.id;
      child.parentConfidence = confidence;
      child.parentReason = reason;
      parent.children.push(child.id);
      return true;
    }

    function ensureInferredNode(state, signature, values, rootGroup) {
      let id = state.keyToId.get(signature);
      if (id != null) return state.nodes[id];
      id = state.nodes.length;
      const node = createNode(id, signature, values, true);
      node.rootGroup = Boolean(rootGroup);
      node.eventCount = 0;
      node.parentReason = rootGroup ? "親情報なしの集約" : "ログ外の親を列情報から推定";
      state.nodes.push(node);
      state.keyToId.set(signature, id);
      state.inferredCount += 1;
      return node;
    }

    function resolveParents(state, options) {
      const { nodes, keyToId } = state;
      const { byPid } = buildIndexes(nodes);

      for (const child of nodes) {
        if (child.inferred || child.rootGroup || !child.parentCandidate) continue;
        const parent = child.parentCandidate;
        let attached = false;

        const directSignature = makeParentSignature(child.deviceKey, parent);
        const directId = keyToId.get(directSignature);
        if (directId != null) {
          attached = attach(nodes, child, nodes[directId], parent.uniqueId ? 0.98 : 0.92, parent.uniqueId ? "一意ID一致" : "PIDと作成時刻一致");
        }

        if (!attached && options.preferTimeInference) {
          const candidate = chooseParentByTime(nodes, byPid, child, parent);
          if (candidate) attached = attach(nodes, child, candidate, 0.68, "PID、親名、時刻から推定");
        }

        if (!attached && hasParentInfo(parent)) {
          const inferred = ensureInferredNode(state, directSignature, parent, false);
          attached = attach(nodes, child, inferred, parent.pid || parent.name ? 0.48 : 0.32, "ログ外の親を集約");
        }

        if (!attached && options.includeUnknownRoot) {
          const unknown = ensureInferredNode(state, `${child.deviceKey}|unknown-parent`, {
            deviceKey: child.deviceKey,
            deviceLabel: child.deviceLabel,
            deviceId: child.deviceId,
            name: "[親不明]",
            timestamp: child.firstSeen
          }, true);
          attach(nodes, child, unknown, 0.12, "親情報なし");
        }
      }

      if (options.includeUnknownRoot) {
        for (const child of nodes) {
          if (child.parentId != null || child.inferred || child.rootGroup) continue;
          const unknown = ensureInferredNode(state, `${child.deviceKey}|unknown-parent`, {
            deviceKey: child.deviceKey,
            deviceLabel: child.deviceLabel,
            deviceId: child.deviceId,
            name: "[親不明]",
            timestamp: child.firstSeen
          }, true);
          attach(nodes, child, unknown, 0.12, "ログ開始前または親情報なし");
        }
      }
    }

    function computeCounts(nodes) {
      for (const node of nodes) {
        node.childCount = node.children.length;
        node.children.sort((a, b) => {
          const an = nodes[a];
          const bn = nodes[b];
          const at = timeMs(an.firstSeen);
          const bt = timeMs(bn.firstSeen);
          if (Number.isFinite(at) && Number.isFinite(bt) && at !== bt) return at - bt;
          return an.displayIndex - bn.displayIndex;
        });
      }

      const memo = new Map();
      function visit(id, stack) {
        if (memo.has(id)) return memo.get(id);
        if (stack.has(id)) return 0;
        stack.add(id);
        let total = 0;
        for (const childId of nodes[id].children) total += 1 + visit(childId, stack);
        stack.delete(id);
        nodes[id].descendantCount = total;
        memo.set(id, total);
        return total;
      }

      for (const node of nodes) visit(node.id, new Set());
    }

    function sortRoots(nodes, roots) {
      return roots.sort((a, b) => {
        const an = nodes[a];
        const bn = nodes[b];
        const ar = an.rootGroup ? 0 : 1;
        const br = bn.rootGroup ? 0 : 1;
        if (ar !== br) return ar - br;
        const at = timeMs(an.firstSeen);
        const bt = timeMs(bn.firstSeen);
        if (Number.isFinite(at) && Number.isFinite(bt) && at !== bt) return at - bt;
        return an.name.localeCompare(bn.name);
      });
    }

    function pruneGraph(nodes, roots, maxNodes) {
      if (nodes.length <= maxNodes) {
        return { nodes, roots, truncated: false, originalNodeCount: nodes.length };
      }

      const keep = new Set();
      const queue = [...roots];
      while (queue.length && keep.size < maxNodes) {
        const id = queue.shift();
        if (keep.has(id)) continue;
        keep.add(id);
        const children = [...nodes[id].children].sort((a, b) => {
          const av = nodes[a].descendantCount + nodes[a].eventCount;
          const bv = nodes[b].descendantCount + nodes[b].eventCount;
          if (av !== bv) return bv - av;
          return nodes[a].displayIndex - nodes[b].displayIndex;
        });
        for (const childId of children) {
          if (keep.size + queue.length >= maxNodes * 2) break;
          queue.push(childId);
        }
      }

      const idMap = new Map();
      const compact = [];
      for (const id of keep) {
        idMap.set(id, compact.length);
        compact.push({ ...nodes[id], children: [] });
      }

      for (const oldId of keep) {
        const next = compact[idMap.get(oldId)];
        next.parentId = nodes[oldId].parentId != null && idMap.has(nodes[oldId].parentId)
          ? idMap.get(nodes[oldId].parentId)
          : null;
        next.children = nodes[oldId].children.filter((id) => idMap.has(id)).map((id) => idMap.get(id));
        next.childCount = nodes[oldId].childCount;
      }

      const compactRoots = roots.filter((id) => idMap.has(id)).map((id) => idMap.get(id));
      for (const node of compact) node.id = idMap.get(node.displayIndex) ?? node.id;

      return {
        nodes: compact.map((node, index) => ({ ...node, id: index })),
        roots: compactRoots,
        truncated: true,
        originalNodeCount: nodes.length
      };
    }

    function publicNode(node) {
      return {
        id: node.id,
        parentId: node.parentId,
        name: node.name,
        pid: node.pid,
        uniqueId: node.uniqueId,
        creationTime: node.creationTime,
        firstSeen: node.firstSeen,
        lastSeen: node.lastSeen,
        path: node.path,
        commandLine: node.commandLine,
        account: node.account,
        deviceLabel: node.deviceLabel,
        deviceId: node.deviceId,
        eventCount: node.eventCount,
        actionTypes: node.actionTypes,
        eventRowsByAction: node.eventRowsByAction,
        children: node.children,
        childCount: node.childCount,
        descendantCount: node.descendantCount,
        inferred: node.inferred,
        rootGroup: node.rootGroup,
        parentConfidence: node.parentConfidence,
        parentReason: node.parentReason
      };
    }

    async function analyze(file, config) {
      const map = config.mapping;
      const options = config.options;
      const state = {
        nodes: [],
        keyToId: new Map(),
        rows: 0,
        skippedRows: 0,
        inferredCount: 0,
        lastProgressAt: 0
      };
      let headerSkipped = false;
      let bytesRead = 0;

      function onRow(row) {
        if (!headerSkipped) {
          headerSkipped = true;
          return;
        }
        state.rows += 1;
        const sourceRowNumber = state.rows + 1;
        const values = eventValues(row, map);
        if (!hasChildIdentity(values)) {
          state.skippedRows += 1;
          return;
        }

        const key = makeProcessKey(values.deviceKey, values);
        let nodeId = state.keyToId.get(key);
        let node;
        if (nodeId == null) {
          nodeId = state.nodes.length;
          node = createNode(nodeId, key, values, false);
          node.eventCount = 0;
          state.nodes.push(node);
          state.keyToId.set(key, nodeId);
        } else {
          node = state.nodes[nodeId];
        }
        updateNode(node, values);
        recordNodeEvent(node, values, sourceRowNumber);

        const parent = parentValues(row, map, values);
        if (hasParentInfo(parent) && (!node.parentCandidate || parent.uniqueId || parent.creationTime)) {
          node.parentCandidate = parent;
        }
      }

      const decoder = new TextDecoder(config.encoding || "utf-8", { fatal: false });
      const parser = createCsvParser(config.delimiter, onRow);
      const reader = file.stream().getReader();

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        bytesRead += value.byteLength;
        parser.push(decoder.decode(value, { stream: true }));
        const now = Date.now();
        if (now - state.lastProgressAt > 220) {
          state.lastProgressAt = now;
          self.postMessage({
            type: "progress",
            bytesRead,
            totalBytes: file.size,
            rows: state.rows,
            nodes: state.nodes.length
          });
        }
      }
      parser.push(decoder.decode());
      parser.finish();

      resolveParents(state, options);
      computeCounts(state.nodes);

      let roots = [];
      for (const node of state.nodes) {
        if (node.parentId == null) roots.push(node.id);
      }
      roots = sortRoots(state.nodes, roots);

      const pruned = pruneGraph(state.nodes, roots, options.renderLimit);
      const stats = {
        rows: state.rows,
        skippedRows: state.skippedRows,
        nodes: pruned.nodes.length,
        originalNodes: pruned.originalNodeCount,
        inferredNodes: pruned.nodes.filter((node) => node.inferred).length,
        roots: pruned.roots.length,
        truncated: pruned.truncated
      };

      return {
        type: "result",
        nodes: pruned.nodes.map(publicNode),
        roots: pruned.roots,
        stats,
        warnings: [
          ...(state.skippedRows ? [`プロセス識別に必要な列が空の行を ${state.skippedRows.toLocaleString()} 行スキップしました。`] : []),
          ...(pruned.truncated ? [`表示ノード上限により ${pruned.originalNodeCount.toLocaleString()} ノードから ${pruned.nodes.length.toLocaleString()} ノードへ絞り込みました。上限を増やすとより多く表示できます。`] : [])
        ]
      };
    }

    async function readSourceRow(file, config) {
      const targetRowNumber = Number(config.rowNumber);
      if (!Number.isFinite(targetRowNumber) || targetRowNumber < 1) {
        throw new Error("行番号が不正です。");
      }

      let physicalRow = 0;
      let headers = [];
      let found = null;
      let bytesRead = 0;

      function onRow(row) {
        physicalRow += 1;
        if (physicalRow === 1) {
          headers = row.map((header) => clean(header).replace(/^\uFEFF/, ""));
        }
        if (physicalRow === targetRowNumber) {
          found = row;
        }
      }

      const decoder = new TextDecoder(config.encoding || "utf-8", { fatal: false });
      const parser = createCsvParser(config.delimiter, onRow);
      const reader = file.stream().getReader();

      while (!found) {
        const { value, done } = await reader.read();
        if (done) break;
        bytesRead += value.byteLength;
        parser.push(decoder.decode(value, { stream: true }));
        if (found) {
          await reader.cancel();
          break;
        }
      }

      if (!found) {
        parser.push(decoder.decode());
        parser.finish();
      }

      if (!found) {
        throw new Error(`行 ${targetRowNumber.toLocaleString()} が見つかりませんでした。`);
      }

      const width = Math.max(headers.length, found.length);
      const columns = [];
      for (let index = 0; index < width; index += 1) {
        columns.push({
          index: index + 1,
          name: headers[index] || `Column ${index + 1}`,
          value: found[index] == null ? "" : String(found[index])
        });
      }

      return {
        type: "rowResult",
        rowNumber: targetRowNumber,
        bytesRead,
        columns
      };
    }

    self.onmessage = async (event) => {
      const message = event.data;
      try {
        let result = null;
        if (message.type === "analyze") {
          result = await analyze(message.file, message.config);
        } else if (message.type === "readRow") {
          result = await readSourceRow(message.file, message.config);
        } else {
          return;
        }
        self.postMessage(result);
      } catch (error) {
        self.postMessage({
          type: message.type === "readRow" ? "rowError" : "error",
          rowNumber: message.config && message.config.rowNumber,
          message: error && error.message ? error.message : String(error)
        });
      }
    };
  </script>

    function normalizeHeader(value) {
      return String(value || "")
        .trim()
        .replace(/^\uFEFF/, "")
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString();
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      let size = bytes;
      let unit = 0;
      while (size >= 1024 && unit < units.length - 1) {
        size /= 1024;
        unit += 1;
      }
      return `${size.toFixed(size >= 10 || unit === 0 ? 0 : 1)} ${units[unit]}`;
    }


    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function detailsResizeBounds() {
      const layoutRect = els.layout.getBoundingClientRect();
      const sidebarRect = els.layout.querySelector(".sidebar").getBoundingClientRect();
      const splitterSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--splitter-size")) || 10;
      const minWidth = 280;
      const maxWidth = Math.max(minWidth, layoutRect.width - sidebarRect.width - splitterSize - 320);
      return { minWidth, maxWidth };
    }

    function applyDetailsWidth(width) {
      if (!els.detailsPane) return;
      if (window.matchMedia("(max-width: 1180px)").matches) return;
      const bounds = detailsResizeBounds();
      state.detailsWidth = clamp(Number(width) || state.detailsWidth || 340, bounds.minWidth, bounds.maxWidth);
      document.documentElement.style.setProperty("--details-width", `${state.detailsWidth}px`);
    }

    function resetDetailsWidth() {
      state.detailsWidth = 340;
      applyDetailsWidth(state.detailsWidth);
    }

    function beginDetailsResize(startX) {
      if (!els.detailsResizer || window.matchMedia("(max-width: 1180px)").matches) return;
      const startWidth = els.detailsPane.getBoundingClientRect().width;
      els.app.classList.add("resizing");

      function onMove(event) {
        const delta = startX - event.clientX;
        applyDetailsWidth(startWidth + delta);
      }

      function onUp() {
        els.app.classList.remove("resizing");
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);
        window.removeEventListener("pointercancel", onUp);
      }

      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp);
      window.addEventListener("pointercancel", onUp);
    }

    function parseDelimitedLine(line, delimiter) {
      const row = [];
      let field = "";
      let inQuotes = false;
      for (let i = 0; i < line.length; i += 1) {
        const c = line[i];
        if (inQuotes) {
          if (c === '"') {
            if (line[i + 1] === '"') {
              field += '"';
              i += 1;
            } else {
              inQuotes = false;
            }
          } else {
            field += c;
          }
        } else if (c === '"') {
          inQuotes = true;
        } else if (c === delimiter) {
          row.push(field);
          field = "";
        } else {
          field += c;
        }
      }
      row.push(field);
      return row;
    }

    function countDelimiter(line, delimiter) {
      let count = 0;
      let inQuotes = false;
      for (let i = 0; i < line.length; i += 1) {
        const c = line[i];
        if (c === '"') {
          if (inQuotes && line[i + 1] === '"') i += 1;
          else inQuotes = !inQuotes;
        } else if (!inQuotes && c === delimiter) {
          count += 1;
        }
      }
      return count;
    }

    function detectDelimiter(text) {
      const firstLine = text.split(/\r?\n/).find((line) => line.trim()) || "";
      const candidates = [",", "\t", ";", "|"];
      let best = ",";
      let bestCount = -1;
      for (const delimiter of candidates) {
        const count = countDelimiter(firstLine, delimiter);
        if (count > bestCount) {
          best = delimiter;
          bestCount = count;
        }
      }
      return best;
    }

    function detectEncoding(bytes) {
      if (bytes.length >= 3 && bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) return "utf-8";
      if (bytes.length >= 2 && bytes[0] === 0xFF && bytes[1] === 0xFE) return "utf-16le";
      if (bytes.length >= 2 && bytes[0] === 0xFE && bytes[1] === 0xFF) return "utf-16be";
      try {
        new TextDecoder("utf-8", { fatal: true }).decode(bytes);
        return "utf-8";
      } catch (error) {
        return "shift-jis";
      }
    }

    function decodeBytes(buffer, encoding) {
      return new TextDecoder(encoding || "utf-8", { fatal: false }).decode(buffer);
    }

    function resolveEncoding(bytes) {
      const selected = els.encodingSelect ? els.encodingSelect.value : "auto";
      if (selected && selected !== "auto") return selected;
      return detectEncoding(bytes);
    }


    function scoreHeader(fieldKey, normalizedHeader) {
      if (!normalizedHeader) return -Infinity;
      const negatives = NEGATIVE_PREFIX[fieldKey] || [];
      for (const prefix of negatives) {
        if (normalizedHeader.startsWith(prefix)) return -40;
      }
      const candidates = CANDIDATES[fieldKey] || [];
      let best = -1;
      for (const candidate of candidates) {
        const normalizedCandidate = normalizeHeader(candidate);
        if (normalizedHeader === normalizedCandidate) best = Math.max(best, 100);
        else if (normalizedHeader.endsWith(normalizedCandidate)) best = Math.max(best, 80);
        else if (normalizedHeader.includes(normalizedCandidate)) best = Math.max(best, 60);
      }
      return best;
    }

    function autoMap(headers) {
      const normalized = headers.map(normalizeHeader);
      const mapping = {};
      const used = new Set();
      for (const field of FIELD_DEFS) {
        let bestIndex = -1;
        let bestScore = 0;
        normalized.forEach((header, index) => {
          if (used.has(index)) return;
          const score = scoreHeader(field.key, header);
          if (score > bestScore) {
            bestScore = score;
            bestIndex = index;
          }
        });
        mapping[field.key] = bestIndex >= 0 ? bestIndex : -1;
        if (bestIndex >= 0) used.add(bestIndex);
      }
      return mapping;
    }

    function renderMapping() {
      const options = [`<option value="-1">未使用</option>`]
        .concat(state.headers.map((header, index) => `<option value="${index}">${escapeHtml(header || `(列 ${index + 1})`)}</option>`))
        .join("");

      els.mappingGrid.innerHTML = FIELD_DEFS.map((field) => {
        const selected = state.mapping[field.key] ?? -1;
        return `
          <div class="field-row">
            <label for="map-${field.key}">${escapeHtml(field.label)}${field.required ? " *" : ""}</label>
            <select id="map-${field.key}" data-field="${field.key}">
              ${options}
            </select>
          </div>
        `;
      }).join("");

      for (const select of els.mappingGrid.querySelectorAll("select")) {
        const field = select.dataset.field;
        select.value = String(selectedIndex(state.mapping[field]));
        select.addEventListener("change", () => {
          state.mapping[field] = Number(select.value);
          updateAnalyzeAvailability();
        });
      }
      updateAnalyzeAvailability();
    }

    function selectedIndex(value) {
      return Number.isInteger(value) ? value : -1;
    }

    function updateAnalyzeAvailability() {
      const hasFile = Boolean(state.file);
      const hasIdentity = ["processUniqueId", "processName", "processPid", "processPath", "processCommandLine"]
        .some((key) => Number(state.mapping[key]) >= 0);
      els.analyzeButton.disabled = !hasFile || !hasIdentity || Boolean(state.worker);
    }

    async function loadFile(file) {
      state.file = file;
      state.graph = null;
      state.nodeById.clear();
      state.expanded.clear();
      state.selectedId = null;
      resetSelectedEvent();
      state.childReveal.clear();
      els.fileName.textContent = `${file.name} (${formatBytes(file.size)})`;
      setProgress(0, "ヘッダーを読み取り中");
      const sampleBuffer = await file.slice(0, Math.min(file.size, 256 * 1024)).arrayBuffer();
      const sampleBytes = new Uint8Array(sampleBuffer);
      state.detectedEncoding = detectEncoding(sampleBytes);
      state.encoding = resolveEncoding(sampleBytes);
      const sample = decodeBytes(sampleBuffer, state.encoding);
      state.delimiter = detectDelimiter(sample);
      const firstLine = sample.split(/\r?\n/).find((line) => line.trim()) || "";
      state.headers = parseDelimitedLine(firstLine, state.delimiter).map((header) => header.trim().replace(/^\uFEFF/, ""));
      state.mapping = autoMap(state.headers);
      renderMapping();
      clearResult();
      const encodingLabel = els.encodingSelect && els.encodingSelect.value === "auto"
        ? `${state.encoding} (auto)`
        : state.encoding;
      setProgress(0, `${state.headers.length} 列を検出 / 区切り文字: ${state.delimiter === "\t" ? "TAB" : state.delimiter} / ${encodingLabel}`);
    }

    function setProgress(percent, text) {
      els.progressBar.style.width = `${Math.max(0, Math.min(100, percent))}%`;
      els.progressText.textContent = text;

    function resetSelectedEvent() {
      state.rowRequestId += 1;
      state.selectedEventRow = null;
      state.selectedEventData = null;
      state.selectedEventLoading = false;
      state.selectedEventError = "";
      if (state.rowWorker) {
        state.rowWorker.terminate();

        state.rowWorker = null;

    function clearResult() {
      els.treeScroll.innerHTML = `<div class="empty">解析を開始するとプロセスツリーを表示します。</div>`;
      els.detailsBody.innerHTML = `<div class="empty">ノードを選択すると詳細を表示します。</div>`;

    function setGraphControls(enabled) {
      for (const el of [els.searchInput, els.searchMode, els.expandButton, els.collapseButton, els.sortMode, els.exportCsvButton, els.exportJsonButton]) {

    function updateStats(stats) {
      els.statsGrid.innerHTML = `
        <div class="stat"><span class="stat-value">${formatNumber(stats.rows)}</span><span class="stat-caption">Rows</span></div>
        <div class="stat"><span class="stat-value">${formatNumber(stats.nodes)}</span><span class="stat-caption">Nodes</span></div>
        <div class="stat"><span class="stat-value">${formatNumber(stats.inferredNodes)}</span><span class="stat-caption">Inferred</span></div>
        <div class="stat"><span class="stat-value">${formatNumber(stats.roots)}</span><span class="stat-caption">Roots</span></div>
      `;
